<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ref</title>
</head>
<body>
    <h1>CALCULADORA  REFATORADA</h1>
    <H2>Uso do Select e Switch case</H2>
    <main>
        <input type="number" placeholder="Insira o primeiro número" id="n1">
        <input type="number" placeholder="Insira o primeiro número" id="n2">
        <select id="op">
            <option value="+">Adição (+)</option>
            <option value="-">Subtração (-)</option>
            <option value="*">Multiplicação (*)</option>
            <option value="/">Divisão</option>
        </select>
        <button onclick="calc()">CALCULADORA</button>
        <p id="res"></p>

    </main>
    <script src="script.js"></script>
    
</body>
</html>
