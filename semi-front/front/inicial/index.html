<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <h1>CALCULADORA</h1>
    <main>
      <div>
        <h2>SOMA</h2>
        <label for="soma1">Digite um número</label>
        <input type="number" id="soma1">
        <label for="soma2">Digite outro número</label>
        <input type="number" id="soma2">
        <button onclick="somar()">CALCULAR</button>
        <p id="respSoma"></p>
      </div>
      <div>
        <h2>SUBTRAÇÃO</h2>
        <label for="sub1">Digite um número</label>
        <input type="number" id="sub1">
        <label for="sub2">Digite outro número</label>
        <input type="number" id="sub2">
        <button onclick="diminuir()">CALCULAR</button>
        <p id="respSub"></p>
      </div>
      <div>
        <h2>MULTIPLICAÇÃO</h2>
        <label for="multi1">Digite um número</label>
        <input type="number" id="multi1">
        <label for="multi2">Digite outro número</label>
        <input type="number" id="multi2">
        <button onclick="Multiplicar()">CALCULAR</button>
        <p id="respMulti"></p>
      </div>
      <div>
        <h2>DIVISÃO</h2>
        <label for="div1">Digite um número</label>
        <input type="number" id="div1">
        <label for="div2">Digite outro número</label>
        <input type="number" id="div2">
        <button onclick="dividir ()">CALCULAR</button>
        <p id="respDiv"></p>
      </div>
    </main>
    <script src="script.js"></script>
    
</body>
</html>
